FilterHK: &FilterHK 
  "^(?=.*((?i)(香港|🇭🇰)))(?!.*((?i)(🔗))).*$"

FilterJP: &FilterJP 
  "^(?=.*((?i)(日本|🇯🇵)))(?!.*((?i)(🔗))).*$"

