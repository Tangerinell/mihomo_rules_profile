name: Compress and Push 7z Archive


on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch: 

# 赋予 GitHub Actions 机器人推送代码到仓库的写权限 (非常重要)
permissions:
  contents: write

jobs:
  compress-and-push:
    runs-on: ubuntu-latest

    # ========== 配置区 ==========
    # 你可以在这里修改你需要打包的路径、输出目录和文件名
    env:
      # 待压缩的文件或文件夹路径（例如：'src/' 或 'data.txt'）
      TARGET_PATH: 'rules/' 
      
      # 自定义输出文件夹（如果不存在会自动创建）
      OUTPUT_DIR: '.' 
      
      # 压缩包的名称
      OUTPUT_FILENAME: 'BundleMRS.7z' 

    # ============================

    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. 安装 7zip 工具
      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      # 3. 创建输出文件夹
      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      # 4. 执行 7z 压缩命令
      - name: Compress to 7z
        run: |
          # 先进入目标文件夹，然后用 . 代表当前目录下的所有内容进行压缩
          # 使用 ${{ github.workspace }} 提供绝对路径，确保输出位置正确
          cd ${{ env.TARGET_PATH }}
          7z a -t7z ${{ github.workspace }}/${{ env.OUTPUT_DIR }}/${{ env.OUTPUT_FILENAME }} .

      # 5. 提交并推送生成的压缩包到仓库
      - name: Commit and Push changes
        run: |
          # 配置 Git 机器人账号
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加生成的 7z 文件
          git add ${{ env.OUTPUT_DIR }}/${{ env.OUTPUT_FILENAME }}
          
          # 检查是否有文件变动（如果文件内容没变，就不提交，防止报错）
          if git diff --staged --quiet; then
            echo "没有检测到文件变动，无需提交。"
          else
            # 提交代码
            git commit -m "Auto-generate 7z archive: ${{ env.OUTPUT_FILENAME }}"
            git push
          fi