name: Auto Update Trackers Ruleset

on:
  schedule:
    # 每天 UTC 时间凌晨 2:00 (北京时间上午 10:00) 自动执行
    - cron: '0 2 * * *'
  # 允许在 GitHub Actions 页面手动点击触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Generator Script
        # 修改这里的路径为你存放 generate.py 的实际路径
        run: python scripts/generate.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 修改这里的路径为你希望提交的生成的 yaml 文件的实际路径
          git add rules/trackers.yaml
          
          # 检查是否有文件变动，如果有则提交并推送
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update trackers ruleset [skip ci]"
            git push
            echo "Ruleset updated and pushed successfully."
          else
            echo "No changes detected. Skipping commit."
          fi